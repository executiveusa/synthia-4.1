version: '3.8'

services:
  cloudbot:
    build: .
    container_name: cloudbot-gateway
    restart: unless-stopped
    ports:
      - "${CLOUDBOT_PORT:-18789}:18789"
    environment:
      - CLOUDBOT_PORT=18789
      - NODE_ENV=production
    volumes:
      - cloudbot-data:/data

volumes:
  cloudbot-data:
    driver: local
